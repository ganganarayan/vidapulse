<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Microsoft Clarity is loaded lazily for unauthenticated visitors only
         (see src/lib/clarity.js + AuthContext) so the dashboard isn't recorded. -->
    <title>VidaPulse — Video Analytics</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Anti-FOUC: apply saved theme before React loads -->
    <script>
      (function () {
        try {
          if (localStorage.getItem('vp_theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
